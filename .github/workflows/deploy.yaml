name: Deploy CRM (Bun)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'

            export PATH="$HOME/.bun/bin:$PATH"

            cd ${{ secrets.PROJECT_PATH }}

            echo "🚀 Pull latest code"
            git pull origin main

            # =========================
            # 🔧 BACKEND (SERVER)
            # =========================
            echo "📦 Backend setup (Bun)"
            cd server

            bun install

            # Prisma MUST use node
            bun x prisma generate
            bun x prisma migrate deploy || true

            pm2 restart crm-api || pm2 start server.js --name crm-api

            # =========================
            # 🌐 FRONTEND (NEXT.js)
            # =========================
            echo "🌐 Frontend setup (Bun)"
            cd ../client

            bun install
            bun run build

            pm2 restart crm-client || pm2 start npm --name crm-client -- start -- -p 3001

            # =========================
            # 💾 SAVE PM2
            # =========================
            pm2 save

            echo "✅ Deployment Done"

          EOF